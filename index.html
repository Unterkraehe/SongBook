function ideaMenu(e, entry){
  const items = [
    {icon:'move', label:'Add to a song…', run: () => assignIdeaFlow(entry.id)},
    {icon:'tagI', label:'Edit tags…', run: () => tagEditor(entry.id)}
  ];
  if (entry.kind === 'text') items.unshift({icon:'pen', label:'Edit phrase', run: () => editTextIdea(entry.id)});
  if (entry.kind === 'audio') items.push({icon:'dl', label:'Download audio', run: () => downloadRecording({recId: entry.recId, name: entry.preview})});
  items.push('-', {icon:'trash', label:'Delete idea…', danger:true, run: () =>
    confirmSheet('Delete this idea?', 'It is removed from the shelf for good.', [
      {label:'Delete', kind:'danger', run: async () => { await removeIdea(entry.id, entry.kind === 'audio'); refreshAfterIdeaChange(); }}
    ])});
  openCtx(e, items);
}
function refreshAfterIdeaChange(){
  if (state.view === 'ideas') render(); // re-derives the tag row too
}

/* ---------------- flows: ideas <-> songs ---------------- */
async function assignIdeaFlow(ideaId){
  const idea = await loadIdea(ideaId);
  if (!idea){ toast('That idea could not be loaded'); return; }
  pickSong('Add idea to which song?', async songId => {
    let song;
    if (state.song && state.song.id === songId){ song = state.song; }
    else {
      const s = await store.get('song:' + songId);
      if (!s){ closeSheet(); toast('That song could not be loaded'); return; }
      song = JSON.parse(s);
    }
    pickSection(song, {title:'Into which section?', allowNew:true}, async sec => {
      applyIdeaToSection(idea, sec, song.title);
      await removeIdea(idea.id, false); // audio ownership moves with it
      if (state.song && state.song.id === songId){ songChanged(true); }
      else { touchSongIdx(song); await saveSongNow(song); }
      refreshAfterIdeaChange();
      toast('Added to ' + (song.title || 'Untitled') + ' · ' + sec.title);
    });
  });
}
function applyIdeaToSection(idea, sec, songTitle){
  if (idea.kind === 'text'){
    sec.lyrics = sec.lyrics.trim() ? sec.lyrics.replace(/\s+$/, '') + '\n\n' + idea.text : idea.text;
  } else {
    sec.recordings.push({id: uid(), recId: idea.recId, name: idea.title || 'From ideas',
                         duration: idea.duration || 0, created: Date.now()});
  }
}
/* from inside a song: pull an idea into a given section (or pick one) */
function sectionFromIdeasFlow(targetSec){
  const song = state.song;
  if (!song) return;
  if (!state.ideasIdx.length){ toast('The idea shelf is empty'); return; }
  openSheet('Pull from ideas', body => {
    const filter = el('input', {class:'textfield', placeholder:'Search the shelf…', 'aria-label':'Search ideas'});
    const list = el('div', {class:'optlist'});
    const draw = () => {
      list.replaceChildren();
      const q = filter.value.toLowerCase();
      const items = state.ideasIdx
        .filter(x => !q || (x.preview + ' ' + (x.tags||[]).join(' ')).toLowerCase().includes(q))
        .sort((a,b) => b.created - a.created).slice(0, 60);
      for (const x of items){
        list.append(el('button', {class:'opt', onclick: () => chose(x)},
          el('span', {class:'kindmark'}, icon(x.kind === 'text' ? 'text' : 'music')),
          el('span', {style:'min-width:0'},
            el('span', {style:'display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, x.preview || '—'),
            el('span', {class:'sub2'}, (x.kind === 'audio' ? fmtDur(x.duration) + ' · ' : '') + (x.tags||[]).join(', ')))));
      }
      if (!items.length) list.append(el('p', {class:'hint'}, 'Nothing matches.'));
    };
    filter.addEventListener('input', draw);
    draw();
    body.append(filter, list);
  });
  async function chose(entry){
    const idea = await loadIdea(entry.id);
    if (!idea){ closeSheet(); toast('That idea could not be loaded'); return; }
    const finish = async sec => {
      applyIdeaToSection(idea, sec, song.title);
      await removeIdea(idea.id, false);
      songChanged(true);
      toast('Added to ' + sec.title);
    };
    if (targetSec){ closeSheet(); finish(targetSec); }
    else pickSection(song, {title:'Into which section?', allowNew:true}, finish);
  }
}

/* ---------------- text idea editor & tags ---------------- */
async function editTextIdea(ideaId){
  const idea = ideaId ? await loadIdea(ideaId) : {id: uid(), kind:'text', text:'', tags:[], created: Date.now()};
  if (!idea){ toast('That idea could not be loaded'); return; }
  let ta;
  openSheet(ideaId ? 'Edit phrase' : 'New phrase', body => {
    ta = el('textarea', {class:'textfield', placeholder:'A line, a title, a fragment…', 'aria-label':'Phrase'});
    ta.value = idea.text;
    body.append(ta, el('p', {class:'hint'}, 'Phrases live on the shelf until you pull them into a song.'));
    setTimeout(() => ta.focus(), 60);
  }, [
    {label:'Cancel', kind:'ghost', run: closeSheet},
    {label: ideaId ? 'Save' : 'Add to shelf', kind:'', run: async () => {
      const text = ta.value.trim();
      if (!text){ toast('Write something first'); return; }
      idea.text = text;
      await saveIdea(idea, !ideaId);
      closeSheet();
      refreshAfterIdeaChange();
    }}
  ]);
}
async function tagEditor(ideaId){
  const idea = await loadIdea(ideaId);
  if (!idea){ toast('That idea could not be loaded'); return; }
  idea.tags = idea.tags || [];
  openSheet('Tags', body => {
    const chips = el('div', {class:'tagedit'});
    const drawChips = () => {
      chips.replaceChildren();
      if (!idea.tags.length) chips.append(el('span', {class:'hint'}, 'No tags yet.'));
      for (const t of idea.tags){
        chips.append(el('span', {class:'tag on'}, t,
          el('button', {'aria-label':'Remove tag ' + t, onclick: () => { idea.tags = idea.tags.filter(x => x !== t); drawChips(); }}, icon('x'))));
      }
    };
    drawChips();
    const input = el('input', {class:'textfield', placeholder:'Add a tag and press Enter', 'aria-label':'New tag'});
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter'){
        ev.preventDefault();
        const t = input.value.trim().toLowerCase();
        if (t && !idea.tags.includes(t)){ idea.tags.push(t); drawChips(); }
        input.value = '';
      }
    });
    const existing = allTags().filter(t => !idea.tags.includes(t)).slice(0, 20);
    body.append(chips, input);
    if (existing.length){
      body.append(el('div', {class:'tagrow'}, existing.map(t =>
        el('button', {class:'tag', onclick: ev => {
          if (!idea.tags.includes(t)) idea.tags.push(t);
          drawChips(); ev.target.remove();
        }}, t))));
    }
    setTimeout(() => input.focus(), 60);
  }, [
    {label:'Done', kind:'', run: async () => {
      const t = $('#overlay input.textfield');
      if (t && t.value.trim()){
        const nt = t.value.trim().toLowerCase();
        if (!idea.tags.includes(nt)) idea.tags.push(nt);
      }
      await saveIdea(idea);
      closeSheet();
      refreshAfterIdeaChange();
    }}
  ]);
}

/* ---------------- download a single take ---------------- */
async function downloadRecording(r){
  const d = await loadAudioB64(r.recId);
  if (!d){ toast('This recording is missing from storage'); return; }
  const ext = d.mime.includes('mp4') ? 'm4a' : d.mime.includes('ogg') ? 'ogg' : 'webm';
  const base = (r.name || 'take').replace(/[^\w\- ]+/g, '').trim() || 'take';
  triggerDownload(b64ToBlob(d.b64, d.mime), base + '.' + ext);
}
function triggerDownload(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = el('a', {href: url, download: filename});
  document.body.append(a);
  a.click();
  setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 4000);
}

/* ---------------- export / import ---------------- */
async function exportAll(){
  toast('Preparing export…');
  flushSaves();
  const songs = [];
  for (const e of state.songsIdx){
    const s = await store.get('song:' + e.id);
    if (s) songs.push(JSON.parse(s));
  }
  const ideas = [];
  for (const e of state.ideasIdx){
    const i = await store.get('idea:' + e.id);
    if (i) ideas.push(JSON.parse(i));
  }
  const recIds = new Set();
  for (const s of songs) for (const sec of s.sections) for (const r of sec.recordings) recIds.add(r.recId);
  for (const i of ideas) if (i.recId) recIds.add(i.recId);
  const recordings = {};
  for (const id of recIds){
    const d = await loadAudioB64(id);
    if (d) recordings[id] = d;
  }
  const payload = {app:'songbook', version:1, exported: new Date().toISOString(), songs, ideas, recordings};
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const stamp = new Date().toISOString().slice(0,10);
  triggerDownload(blob, 'songbook-' + stamp + '.json');
  toast('Export ready (' + songs.length + ' songs, ' + ideas.length + ' ideas)');
}

async function importFile(file){
  let data;
  try{ data = JSON.parse(await file.text()); }
  catch(e){ toast('That file is not a valid Songbook export'); return; }
  if (!data || data.app !== 'songbook' || !Array.isArray(data.songs) || !Array.isArray(data.ideas)){
    toast('That file is not a valid Songbook export'); return;
  }
  toast('Importing…');
  const songIds = new Set(state.songsIdx.map(x => x.id));
  const songFps = new Set();
  for (const e of state.songsIdx){
    const s = await store.get('song:' + e.id);
    if (s) songFps.add(songFingerprint(JSON.parse(s)));
  }
  const ideaIds = new Set(state.ideasIdx.map(x => x.id));
  const ideaFps = new Set();
  for (const e of state.ideasIdx){
    if (e.kind === 'text'){
      const i = await store.get('idea:' + e.id);
      if (i) ideaFps.add(ideaFingerprint(JSON.parse(i)));
    } else ideaFps.add('audio:' + e.recId);
  }
  const recs = data.recordings || {};
  const neededRecs = new Set();
  let addedSongs = 0, addedIdeas = 0, skipped = 0;

  for (const song of data.songs){
    if (!song || !song.id || !Array.isArray(song.sections)) continue;
    if (songIds.has(song.id) || songFps.has(songFingerprint(song))){ skipped++; continue; }
    for (const sec of song.sections){
      sec.recordings = (sec.recordings || []).filter(r => r.recId && (recs[r.recId] || recRefs[r.recId]));
      for (const r of sec.recordings){ neededRecs.add(r.recId); addRef(r.recId); }
    }
    await saveSongNow(song);
    state.songsIdx.push(idxEntryFor(song));
    songIds.add(song.id); songFps.add(songFingerprint(song));
    addedSongs++;
  }
  for (const idea of data.ideas){
    if (!idea || !idea.id || !idea.kind) continue;
    const fp = ideaFingerprint(idea);
    if (ideaIds.has(idea.id) || ideaFps.has(fp)){ skipped++; continue; }
    if (idea.kind === 'audio'){
      if (!idea.recId || (!recs[idea.recId] && !recRefs[idea.recId])){ skipped++; continue; }
      neededRecs.add(idea.recId);
      addRef(idea.recId);
    }
    await store.set('idea:' + idea.id, JSON.stringify(idea));
    state.ideasIdx.push(ideaIdxEntry(idea));
    ideaIds.add(idea.id); ideaFps.add(fp);
    addedIdeas++;
  }
  let failedAudio = 0;
  for (const recId of neededRecs){
    if (await hasAudio(recId)) continue; // same audio already present
    const d = recs[recId];
    if (!d || !d.b64){ failedAudio++; continue; }
    const ok = await saveAudioB64(recId, d.b64, d.mime || 'audio/webm');
    if (!ok) failedAudio++;
  }
  await persistIndexes();
  state.ideaShown = 0;
  render();
  toast('Imported ' + addedSongs + ' songs and ' + addedIdeas + ' ideas' +
    (skipped ? ' — skipped ' + skipped + ' already here' : '') +
    (failedAudio ? ' — ' + failedAudio + ' recordings missing audio' : ''));
}

/* ================================================================
   Navigation: every view is a history entry, so the device back
   button steps back through the app instead of leaving it.
   Menus and sheets each hold one shared "modal" entry, so back
   dismisses them first.
   ================================================================ */
let navDepth = 0;        // view entries we pushed ourselves
let modalEntry = false;  // a menu/sheet currently owns a history entry
let popExpected = false; // a back() we triggered ourselves

function viewState(){ return state.view === 'song' ? {v:'song', id: state.songId} : {v: state.view}; }
function pushModal(){
  if (modalEntry) return;              // chained sheets reuse the one entry
  modalEntry = true;
  history.pushState({...viewState(), modal:true}, '');
}
function popModal(){
  if (!modalEntry) return;
  modalEntry = false; popExpected = true;
  history.back();
}
function navTo(st, replace){
  if (replace) history.replaceState(st, '');
  else { history.pushState(st, ''); navDepth++; }
  return applyState(st);
}
function navBack(fallback){
  if (navDepth > 0) history.back();
  else navTo(fallback, true);
}
function goView(v){
  if (state.view === v) return;
  if (state.view === 'song' && v === 'songs') return navBack({v:'songs'});
  navTo({v});
}
const VIEW_ORDER = {songs:0, ideas:1};
async function applyState(st){
  st = st || {v:'songs'};
  const v = st.v || 'songs';
  const from = state.view;
  if (v === 'song' && st.id){
    if (!(await loadSongInto(st.id))){
      toast('That song is no longer here');
      return navTo({v:'songs'}, true);
    }
    render();
    if (st.focus){ const t = $('.songtitle-input'); if (t){ t.focus(); t.select(); } }
    return;
  }
  flushSaves();
  state.song = null; state.songId = null;
  state.view = (v === 'ideas') ? 'ideas' : 'songs';
  if (state.view === 'ideas') state.ideaShown = 0;
  if (VIEW_ORDER[from] != null && from !== state.view)
    pendingDir = VIEW_ORDER[state.view] > VIEW_ORDER[from] ? 'left' : 'right';
  render();
}
window.addEventListener('popstate', e => {
  if (popExpected){ popExpected = false; return; }   // our own dismissal — already handled
  if (modalEntry){                                    // back closes the menu/sheet, nothing else
    modalEntry = false; hideCtxEl(); hideSheetEl();
    return;
  }
  navDepth = Math.max(0, navDepth - 1);
  applyState(e.state);
});

/* ---------------- swipe between Songs and Ideas ---------------- */
(function(){
  let x0 = 0, y0 = 0, t0 = 0, tracking = false;
  const NO_SWIPE = 'input, textarea, .tagrow, .chip, .seg, #recbar, #ctxmenu, .sheet';
  document.addEventListener('touchstart', e => {
    tracking = false;
    if (e.touches.length !== 1) return;
    if (state.view !== 'songs' && state.view !== 'ideas') return;
    if (modalEntry || sheetIsOpen() || ctxIsOpen()) return;
    if (e.target.closest && e.target.closest(NO_SWIPE)) return;
    const t = e.touches[0];
    x0 = t.clientX; y0 = t.clientY; t0 = performance.now(); tracking = true;
  }, {passive:true});
  document.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - x0, dy = t.clientY - y0;
    if (performance.now() - t0 > 700) return;               // a slow drag is not a swipe
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.7) return;  // must be decisively sideways
    if (dx < 0) goView('ideas'); else goView('songs');
  }, {passive:true});
})();

/* ---------------- theme & app menu ---------------- */
function applyTheme(){
  const t = state.prefs.theme;
  const dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  const btn = $('#themebtn');
  btn.innerHTML = dark ? I.moon : I.sun;
  btn.title = 'Theme: ' + t + ' — tap to switch';
  const meta = document.querySelector('meta[name=theme-color]');
  if (meta) meta.content = dark ? '#131110' : '#F5F4F0';
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (state.prefs.theme === 'auto') applyTheme();
});
$('#themebtn').addEventListener('click', () => {
  const order = ['auto','light','dark'];
  state.prefs.theme = order[(order.indexOf(state.prefs.theme) + 1) % 3];
  savePrefs();
  applyTheme();
  toast('Theme: ' + state.prefs.theme);
});
$('#menubtn').innerHTML = I.swap;
$('#menubtn').addEventListener('click', e => openCtx(e, [
  {icon:'dl', label:'Export everything', run: exportAll},
  {icon:'ul', label:'Import a Songbook file…', run: () => $('#importfile').click()}
]));
$('#importfile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (f) importFile(f);
});
$('#tab-songs').addEventListener('click', () => goView('songs'));
$('#tab-ideas').addEventListener('click', () => goView('ideas'));
$('#rec-stop').addEventListener('click', () => stopRecording(true));
$('#rec-cancel').addEventListener('click', () => stopRecording(false));

document.addEventListener('visibilitychange', () => { if (document.hidden) flushSaves(); });
window.addEventListener('pagehide', flushSaves);
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's'){ e.preventDefault(); flushSaves(); toast('Saved'); }
});

/* ---------------- boot ---------------- */
(async function init(){
  await store.init();
  try{
    const [p, s, i, r] = await Promise.all([
      store.get('meta:prefs'), store.get('meta:songs'), store.get('meta:ideas'), store.get('meta:recrefs')
    ]);
    if (p) state.prefs = Object.assign({theme:'auto'}, JSON.parse(p));
    if (s) state.songsIdx = JSON.parse(s) || [];
    if (i) state.ideasIdx = JSON.parse(i) || [];
    if (r) recRefs = JSON.parse(r) || {};
  }catch(e){ console.error('boot parse', e); }
  applyTheme();
  const h = history.state;
  const st0 = (h && h.v) ? {v: h.v, id: h.id} : {v:'songs'};
  history.replaceState(st0, '');
  await applyState(st0);
})();

/* ---------------- PWA: offline shell ---------------- */
if ('serviceWorker' in navigator && location.protocol !== 'file:'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed', e));
  });
}
